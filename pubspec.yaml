name: uwangku
description: "UWANGKU - Asisten Keuangan Pribadi Berbasis AI"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path: ^1.9.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  pocketbase: ^0.23.2
  connectivity_plus: ^7.1.1
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.3
  flutter_dotenv: ^6.0.1
  speech_to_text: ^7.0.0
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  google_generative_ai: ^0.4.7
  http: ^1.2.1
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.6
  share_plus: ^10.0.0
  webview_flutter: ^4.10.0
  flutter_tesseract_ocr: ^0.4.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/tessdata/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#263238"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false